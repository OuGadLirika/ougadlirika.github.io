<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 870 450" role="img">
  <title>Grafická reprezentácia výpočtu 5-teho člena Fibonacciho postupnosti</title>
  <defs>
    <style>
      .edge { fill: none; stroke: #111; stroke-width: 4; stroke-linecap: square; stroke-linejoin: miter; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #fff; }
      .value { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #111; }
      .result { fill: #f7f9f8; fill-opacity: .9; stroke-width: 4; }
    </style>
  </defs>

  <rect x="0" y="0" width="870" height="450" fill="#fff"/>

  <path class="edge" d="M468 100 V116 H298 V130"/>
  <path class="edge" d="M468 100 V116 H640 V130"/>
  <path class="edge" d="M298 200 V218 H210 V232"/>
  <path class="edge" d="M298 200 V218 H382 V232"/>
  <path class="edge" d="M640 200 V218 H555 V232"/>
  <path class="edge" d="M640 200 V218 H724 V232"/>
  <path class="edge" d="M210 300 V318 H125 V336"/>
  <path class="edge" d="M210 300 V318 H296 V336"/>

  <g>
    <rect x="406" y="28" width="160" height="62" fill="#4f82bd"/>
    <rect class="result" x="430" y="76" width="128" height="23" stroke="#4f82bd"/>
    <text class="label" x="410" y="63">fibonacci(4)</text>
    <text class="value" x="492" y="94">3+2=5</text>
  </g>

  <g>
    <rect x="234" y="132" width="160" height="62" fill="#c34848"/>
    <rect class="result" x="258" y="180" width="128" height="23" stroke="#c34848"/>
    <text class="label" x="238" y="167">fibonacci(3)</text>
    <text class="value" x="325" y="198">2+1=3</text>
  </g>

  <g>
    <rect x="578" y="132" width="160" height="62" fill="#76973b"/>
    <rect class="result" x="602" y="180" width="128" height="23" stroke="#76973b"/>
    <text class="label" x="582" y="167">fibonacci(2)</text>
    <text class="value" x="670" y="198">1+1=2</text>
  </g>

  <g>
    <rect x="148" y="236" width="160" height="62" fill="#76973b"/>
    <rect class="result" x="172" y="284" width="128" height="23" stroke="#76973b"/>
    <text class="label" x="152" y="271">fibonacci(2)</text>
    <text class="value" x="240" y="302">1+1=2</text>
  </g>

  <g>
    <rect x="320" y="236" width="160" height="62" fill="#2b8da0"/>
    <rect class="result" x="344" y="284" width="128" height="23" stroke="#2b8da0"/>
    <text class="label" x="324" y="271">fibonacci(0)</text>
    <text class="value" x="446" y="302">1</text>
  </g>

  <g>
    <rect x="492" y="236" width="160" height="62" fill="#5b477e"/>
    <rect class="result" x="516" y="284" width="128" height="23" stroke="#5b477e"/>
    <text class="label" x="496" y="271">fibonacci(1)</text>
    <text class="value" x="618" y="302">1</text>
  </g>

  <g>
    <rect x="664" y="236" width="160" height="62" fill="#2b8da0"/>
    <rect class="result" x="688" y="284" width="128" height="23" stroke="#2b8da0"/>
    <text class="label" x="668" y="271">fibonacci(0)</text>
    <text class="value" x="790" y="302">1</text>
  </g>

  <g>
    <rect x="63" y="340" width="160" height="62" fill="#5b477e"/>
    <rect class="result" x="87" y="388" width="128" height="23" stroke="#5b477e"/>
    <text class="label" x="67" y="375">fibonacci(1)</text>
    <text class="value" x="189" y="406">1</text>
  </g>

  <g>
    <rect x="234" y="340" width="160" height="62" fill="#2b8da0"/>
    <rect class="result" x="258" y="388" width="128" height="23" stroke="#2b8da0"/>
    <text class="label" x="238" y="375">fibonacci(0)</text>
    <text class="value" x="360" y="406">1</text>
  </g>
</svg>
