<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="boy.png" rel="icon">
    <link href="boy.png" rel="apple-touch-icon">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #2d2d2d;
        }

        #quiz-container {
            background-color: white;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        #question {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #1f2937;
            min-height: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #answers {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .answer-button, #show-answer-button {
            display: block;
            width: 100%;
            padding: 0.75rem 1rem;
            margin: 0.5rem 0;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            background-color: #f9fafb;
            cursor: pointer;
            font-size: 1rem;
            color: #374151;
            transition: background-color 0.2s ease-in-out, border-color 0.2s ease-in-out;
        }
        .answer-button {
             text-align: left;
        }
        #show-answer-button {
            text-align: center;
        }

        .answer-button:hover:not(:disabled), #show-answer-button:hover:not(:disabled) {
            background-color: #e5e7eb;
            border-color: #9ca3af;
        }

        .answer-button.correct {
            background-color: #d1fae5;
            border-color: #10b981;
            color: #065f46;
            font-weight: 700;
        }

        .answer-button.incorrect {
            background-color: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
            font-weight: 700;
        }

        .answer-button:disabled, #show-answer-button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .displayed-answer {
            margin-top: 1rem;
            padding: 0.75rem;
            background-color: #e0f2fe;
            border: 1px solid #7dd3fc;
            border-radius: 0.5rem;
            color: #0c4a6e;
            font-weight: 600;
            text-align: center;
        }

        #explanation-container {
            margin-top: 1.25rem;
            padding: 0.75rem 1rem;
            background-color: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            color: #4b5563;
            text-align: left;
            font-size: 0.9rem;
            display: flex;
            align-items: flex-start;
            line-height: 1.5;
        }
        #explanation-container.hidden {
            display: none;
        }
        .info-icon {
            display: inline-block;
            font-weight: bold;
            color: #3b82f6;
            margin-right: 0.6rem;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        #explanation-text {
            flex-grow: 1;
        }

        #next-button-container {
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 1.5rem;
        }

        #next-button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            border-radius: 0.5rem;
            background-color: #3b82f6;
            color: white;
            transition: background-color 0.2s ease-in-out;
            visibility: visible;
        }
        #next-button:hover {
            background-color: #2563eb;
        }
        #next-button.hidden {
            visibility: hidden;
        }

    </style>
</head>
<body>
    <div id="quiz-container">
        <h2 id="question">Načítavam otázku...</h2>
        <div id="answers">
            </div>
        <div id="explanation-container" class="hidden">
            <span class="info-icon">ⓘ</span>
            <span id="explanation-text"></span>
        </div>

        <div id="next-button-container">
             <button id="next-button" class="hidden">Ďalšia otázka</button>
        </div>
    </div>

    <script src="questions.js"></script>

    <script>
        let currentQuestionIndex = 0;
        let shuffledQuestions = [];

        const questionElement = document.getElementById('question');
        const answersElement = document.getElementById('answers');
        const nextButton = document.getElementById('next-button');
        const explanationContainer = document.getElementById('explanation-container');
        const explanationTextElement = document.getElementById('explanation-text');

        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [
                    array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function startQuiz() {
            if (typeof questions === 'undefined' || questions.length === 0) {
                questionElement.innerText = 'Chyba: Otázky sa nepodarilo načítať alebo sú prázdne.';
                console.error("Pole 'questions' nie je definované alebo je prázdne. Skontrolujte súbor questions.js.");
                answersElement.innerHTML = '';
                explanationContainer.classList.add('hidden');
                nextButton.classList.add('hidden');
                return;
            }
            shuffledQuestions = shuffleArray([...questions]);
            currentQuestionIndex = 0;
            nextButton.classList.add('hidden');
            nextButton.innerText = 'Ďalšia otázka';
            nextButton.removeEventListener('click', startQuiz);
            nextButton.addEventListener('click', handleNextButton);
            showQuestion();
        }

        function showQuestion() {
            resetState();

            if (currentQuestionIndex >= shuffledQuestions.length) {
                console.warn("Index otázky bol mimo rozsahu, začínam nový cyklus.");
                shuffledQuestions = shuffleArray([...questions]);
                currentQuestionIndex = 0;
            }

            const currentQuestion = shuffledQuestions[currentQuestionIndex];
            questionElement.innerText = `Otázka ${currentQuestionIndex + 1} / ${shuffledQuestions.length}: ${currentQuestion.question}`;

            if (currentQuestion.type === 'show-answer') {
                const showAnswerBtn = document.createElement('button');
                showAnswerBtn.innerText = 'Zobraziť odpoveď';
                showAnswerBtn.id = 'show-answer-button';
                showAnswerBtn.addEventListener('click', showCorrectAnswer);
                answersElement.appendChild(showAnswerBtn);

            } else {
                const shuffledAnswers = shuffleArray([...currentQuestion.answers]);
                shuffledAnswers.forEach(answer => {
                    const button = document.createElement('button');
                    button.innerText = answer.text;
                    button.classList.add('answer-button');
                    if (answer.correct) {
                        button.dataset.correct = "true";
                    }
                    button.addEventListener('click', selectAnswer);
                    answersElement.appendChild(button);
                });
            }
        }

        function resetState() {
            nextButton.classList.add('hidden');
            answersElement.innerHTML = '';
            explanationContainer.classList.add('hidden');
            explanationTextElement.textContent = '';
        }

        function showExplanation() {
            const currentQuestion = shuffledQuestions[currentQuestionIndex];
            if (currentQuestion.explanation && currentQuestion.explanation.trim() !== '') {
                explanationTextElement.innerText = currentQuestion.explanation;
                explanationContainer.classList.remove('hidden');
            } else {
                explanationContainer.classList.add('hidden');
            }
        }

        function selectAnswer(e) {
            const selectedButton = e.target;
            const isCorrect = selectedButton.dataset.correct === "true";

            if (isCorrect) {
                selectedButton.classList.add('correct');
            } else {
                selectedButton.classList.add('incorrect');
            }

            Array.from(answersElement.children).forEach(button => {
                if (button.dataset.correct === "true" && !button.classList.contains('correct')) {
                     button.classList.add('correct');
                }
                 button.disabled = true;
             });

            showExplanation();
            nextButton.classList.remove('hidden');
        }

        function showCorrectAnswer(e) {
            const currentQuestion = shuffledQuestions[currentQuestionIndex];
            const showAnswerButton = e.target;

            showAnswerButton.remove();

            const answerTextElement = document.createElement('p');
            answerTextElement.innerText = currentQuestion.answerText;
            answerTextElement.classList.add('displayed-answer');
            answersElement.appendChild(answerTextElement);

            showExplanation();
            nextButton.classList.remove('hidden');
        }

        function handleNextButton() {
            currentQuestionIndex++;
            if (currentQuestionIndex < shuffledQuestions.length) {
                showQuestion();
            } else {
                shuffledQuestions = shuffleArray([...questions]);
                currentQuestionIndex = 0;
                showQuestion();
            }
        }

        document.addEventListener('DOMContentLoaded', startQuiz);

    </script>
</body>
</html>
